[build]
  command = "npm run build && cp public/ads.txt dist/ads.txt && echo '--- ADS TXT CHECK ---' && cat dist/ads.txt"
  publish = "dist"

[[headers]]
  for = "/ads.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=0, must-revalidate"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200