[build]
  command = "npm run build && mkdir -p dist/about dist/how-to-play dist/support dist/contact dist/privacy-policy dist/terms && cp public/ads.txt dist/ads.txt && cp public/robots.txt dist/robots.txt && cp public/sitemap.xml dist/sitemap.xml && cp public/static-site.css dist/static-site.css && cp public/about/index.html dist/about/index.html && cp public/how-to-play/index.html dist/how-to-play/index.html && cp public/support/index.html dist/support/index.html && cp public/contact/index.html dist/contact/index.html && cp public/privacy-policy/index.html dist/privacy-policy/index.html && cp public/terms/index.html dist/terms/index.html && echo '--- STATIC PUBLIC FILES CHECK ---' && test -f dist/about/index.html && test -f dist/how-to-play/index.html && test -f dist/support/index.html && test -f dist/contact/index.html && test -f dist/privacy-policy/index.html && test -f dist/terms/index.html && test -f dist/static-site.css && echo 'Static pages OK' && echo '--- ADS TXT CHECK ---' && cat dist/ads.txt"
  publish = "dist"

[[headers]]
  for = "/ads.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/static-site.css"
  [headers.values]
    Content-Type = "text/css; charset=utf-8"
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/about/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/how-to-play/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/support/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/contact/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/privacy-policy/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/terms/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[redirects]]
  from = "/about"
  to = "/about/"
  status = 301

[[redirects]]
  from = "/about/"
  to = "/about/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/how-to-play"
  to = "/how-to-play/"
  status = 301

[[redirects]]
  from = "/how-to-play/"
  to = "/how-to-play/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/support"
  to = "/support/"
  status = 301

[[redirects]]
  from = "/support/"
  to = "/support/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/contact"
  to = "/contact/"
  status = 301

[[redirects]]
  from = "/contact/"
  to = "/contact/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/privacy-policy"
  to = "/privacy-policy/"
  status = 301

[[redirects]]
  from = "/privacy-policy/"
  to = "/privacy-policy/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/terms"
  to = "/terms/"
  status = 301

[[redirects]]
  from = "/terms/"
  to = "/terms/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200