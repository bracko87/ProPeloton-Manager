[build]
  command = "npm run build && mkdir -p dist/about dist/how-to-play dist/game-guide dist/demo dist/demo/overview dist/demo/calendar dist/demo/race-preparation dist/demo/stage-replay dist/demo/rider-profile dist/demo/finances dist/demo/rankings dist/support dist/contact dist/privacy-policy dist/terms && cp public/ads.txt dist/ads.txt && cp public/robots.txt dist/robots.txt && cp public/sitemap.xml dist/sitemap.xml && cp public/static-site.css dist/static-site.css && cp public/about/index.html dist/about/index.html && cp public/how-to-play/index.html dist/how-to-play/index.html && cp public/game-guide/index.html dist/game-guide/index.html && cp public/demo/index.html dist/demo/index.html && cp public/demo/overview/index.html dist/demo/overview/index.html && cp public/demo/calendar/index.html dist/demo/calendar/index.html && cp public/demo/race-preparation/index.html dist/demo/race-preparation/index.html && cp public/demo/stage-replay/index.html dist/demo/stage-replay/index.html && cp public/demo/rider-profile/index.html dist/demo/rider-profile/index.html && cp public/demo/finances/index.html dist/demo/finances/index.html && cp public/demo/rankings/index.html dist/demo/rankings/index.html && cp public/support/index.html dist/support/index.html && cp public/contact/index.html dist/contact/index.html && cp public/privacy-policy/index.html dist/privacy-policy/index.html && cp public/terms/index.html dist/terms/index.html && echo '--- STATIC PUBLIC FILES CHECK ---' && test -f dist/demo/index.html && test -f dist/demo/overview/index.html && test -f dist/demo/calendar/index.html && test -f dist/demo/race-preparation/index.html && test -f dist/demo/stage-replay/index.html && test -f dist/demo/rider-profile/index.html && test -f dist/demo/finances/index.html && test -f dist/demo/rankings/index.html && test -f dist/static-site.css && echo 'Static demo pages OK' && echo '--- ADS TXT CHECK ---' && cat dist/ads.txt"
  publish = "dist"

[[headers]]
  for = "/ads.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/static-site.css"
  [headers.values]
    Content-Type = "text/css; charset=utf-8"
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/about/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/how-to-play/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/game-guide/*"
