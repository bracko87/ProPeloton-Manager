<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <title>ProPeloton Manager</title>

    <link
      rel="icon"
      type="image/png"
      href="https://okuravitxocyevkexfgi.supabase.co/storage/v1/object/public/Admin%20Staff/Brend%20images/favicon4.png"
    />

    <link
      rel="apple-touch-icon"
      href="https://okuravitxocyevkexfgi.supabase.co/storage/v1/object/public/Admin%20Staff/Brend%20images/favicon4.png"
    />

    <link
      href="main.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <div id="app"></div>

    <script src="main.js"></script>

    <script>
      const isDevelopmentPreview =
        location.hostname === 'localhost' ||
        location.hostname === '127.0.0.1' ||
        location.hostname.startsWith('192.168.')

      if (isDevelopmentPreview) {
        new EventSource('/esbuild').addEventListener(
          'change',
          () => location.reload(),
        )
      }
    </script>
  </body>
</html>
